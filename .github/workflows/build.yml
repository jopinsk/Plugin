name: Build WelcomePlugin

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        working-directory: WelcomePlugin
        run: dotnet restore

      - name: Build (Release)
        working-directory: WelcomePlugin
        run: dotnet build -c Release --no-restore

      - name: Collect artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          Copy-Item WelcomePlugin/bin/Release/WelcomePlugin.dll artifact/WelcomePlugin.dll -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: WelcomePlugin
          path: artifact/WelcomePlugin.dll

      - name: Create Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifact/WelcomePlugin.dll
          generate_release_notes: true
